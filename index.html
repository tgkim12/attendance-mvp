<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>근태관리 시스템</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen">

  <header class="bg-blue-600 text-white shadow-md">
    <div class="max-w-3xl mx-auto px-4 py-4 flex justify-between items-center">
      <div>
        <h1 class="text-xl font-bold">근태관리 시스템</h1>
        <p class="text-blue-200 text-xs mt-0.5">직원 연가 신청 페이지</p>
      </div>
      <a href="admin.html" class="text-sm bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-lg transition">
        관리자 페이지 →
      </a>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8 space-y-5">

    <!-- 직원 등록 -->
    <div class="bg-white rounded-xl border shadow-sm p-6">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">직원 등록</h2>
      <div class="flex gap-2">
        <input id="newName" type="text" placeholder="이름을 입력하고 엔터"
               class="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
               onkeydown="if(event.key==='Enter') addEmployee()">
        <button onclick="addEmployee()"
                class="bg-blue-600 hover:bg-blue-700 text-white text-sm px-4 py-2 rounded-lg font-medium transition">
          등록
        </button>
      </div>
    </div>

    <!-- 직원 선택 -->
    <div class="bg-white rounded-xl border shadow-sm p-6">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">직원 선택</h2>
      <select id="empSelect" onchange="selectEmployee()"
              class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 bg-white">
        <option value="">-- 직원을 선택하세요 --</option>
      </select>
    </div>

    <!-- 대시보드 (선택 후 표시) -->
    <div id="dashboard" class="hidden space-y-5">

      <!-- 연가 현황 -->
      <div class="bg-white rounded-xl border shadow-sm p-6">
        <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-4">연가 현황</h2>
        <div class="grid grid-cols-3 gap-4 text-center">
          <div class="bg-blue-50 rounded-xl p-4">
            <div id="totalDays" class="text-4xl font-bold text-blue-600">15</div>
            <div class="text-xs text-gray-400 mt-1">총 연가</div>
          </div>
          <div class="bg-emerald-50 rounded-xl p-4">
            <div id="usedDays" class="text-4xl font-bold text-emerald-500">0</div>
            <div class="text-xs text-gray-400 mt-1">승인됨</div>
          </div>
          <div class="bg-orange-50 rounded-xl p-4">
            <div id="remainDays" class="text-4xl font-bold text-orange-500">15</div>
            <div class="text-xs text-gray-400 mt-1">잔여</div>
          </div>
        </div>
      </div>

      <!-- 연가 신청 -->
      <div class="bg-white rounded-xl border shadow-sm p-6">
        <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-4">연가 신청</h2>
        <div class="space-y-3">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs text-gray-400 block mb-1">시작일</label>
              <input type="date" id="startDate"
                     class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <div>
              <label class="text-xs text-gray-400 block mb-1">종료일</label>
              <input type="date" id="endDate"
                     class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
          </div>
          <div>
            <label class="text-xs text-gray-400 block mb-1">사유 (선택)</label>
            <input type="text" id="reason" placeholder="연가 사유를 입력하세요"
                   class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          </div>
          <div id="daysPreview" class="text-sm font-medium text-blue-600 h-5"></div>
          <button onclick="applyLeave()"
                  class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-2.5 rounded-lg text-sm font-semibold transition">
            연가 신청하기
          </button>
        </div>
      </div>

      <!-- 신청 내역 -->
      <div class="bg-white rounded-xl border shadow-sm p-6">
        <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-4">내 신청 내역</h2>
        <div id="history">
          <p class="text-gray-300 text-sm text-center py-6">신청 내역이 없습니다.</p>
        </div>
      </div>

    </div>
  </main>

  <!-- Toast -->
  <div id="toast"
       class="fixed bottom-6 left-1/2 -translate-x-1/2 text-white text-sm px-5 py-2.5 rounded-xl shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50">
  </div>

  <script>
    const SUPABASE_URL = 'https://jygugdubaxipjykmagso.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5Z3VnZHViYXhpcGp5a21hZ3NvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzE3NjMsImV4cCI6MjA4ODgwNzc2M30.KdSqud604Kfo0QIlH8IycQPcPPwIn307y13eFENfs24';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    let selectedEmp = null;

    function showToast(msg, isError = false) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `fixed bottom-6 left-1/2 -translate-x-1/2 text-white text-sm px-5 py-2.5 rounded-xl shadow-lg transition-opacity duration-300 z-50 ${isError ? 'bg-red-500' : 'bg-gray-800'}`;
      el.style.opacity = '1';
      setTimeout(() => { el.style.opacity = '0'; }, 2800);
    }

    function getWorkdays(start, end) {
      let count = 0;
      const cur = new Date(start + 'T00:00:00');
      const last = new Date(end + 'T00:00:00');
      while (cur <= last) {
        const d = cur.getDay();
        if (d !== 0 && d !== 6) count++;
        cur.setDate(cur.getDate() + 1);
      }
      return count;
    }

    async function loadEmployees() {
      const { data, error } = await db.from('employees').select('*').order('created_at');
      if (error) { showToast('직원 목록을 불러오지 못했습니다.', true); return; }

      const select = document.getElementById('empSelect');
      const cur = select.value;
      select.innerHTML = '<option value="">-- 직원을 선택하세요 --</option>';
      (data || []).forEach(emp => {
        const opt = document.createElement('option');
        opt.value = emp.id;
        opt.textContent = emp.name;
        select.appendChild(opt);
      });
      if (cur) {
        select.value = cur;
        if (!select.value) {
          document.getElementById('dashboard').classList.add('hidden');
          selectedEmp = null;
        }
      }
    }

    async function addEmployee() {
      const input = document.getElementById('newName');
      const name = input.value.trim();
      if (!name) { showToast('이름을 입력해 주세요.', true); return; }

      const { error } = await db.from('employees').insert({ name });
      if (error) {
        showToast(error.code === '23505' ? '이미 등록된 이름입니다.' : '등록 중 오류가 발생했습니다.', true);
        return;
      }
      input.value = '';
      await loadEmployees();
      showToast(name + ' 직원이 등록되었습니다.');
    }

    async function selectEmployee() {
      const id = document.getElementById('empSelect').value;
      if (!id) {
        document.getElementById('dashboard').classList.add('hidden');
        selectedEmp = null;
        return;
      }
      const { data, error } = await db.from('employees').select('*').eq('id', id).single();
      if (error) { showToast('직원 정보를 불러오지 못했습니다.', true); return; }
      selectedEmp = data;
      document.getElementById('dashboard').classList.remove('hidden');
      await refreshDashboard();
    }

    async function refreshDashboard() {
      if (!selectedEmp) return;
      const { data: reqs } = await db.from('leave_requests')
        .select('*').eq('employee_id', selectedEmp.id).order('created_at', { ascending: false });

      const approved = (reqs || []).filter(r => r.status === 'approved').reduce((s, r) => s + r.days, 0);
      document.getElementById('totalDays').textContent = selectedEmp.total_leave;
      document.getElementById('usedDays').textContent = approved;
      document.getElementById('remainDays').textContent = selectedEmp.total_leave - approved;
      renderHistory(reqs || []);
    }

    function renderHistory(reqs) {
      const el = document.getElementById('history');
      if (reqs.length === 0) {
        el.innerHTML = '<p class="text-gray-300 text-sm text-center py-6">신청 내역이 없습니다.</p>';
        return;
      }
      const badge = {
        pending:  'bg-yellow-100 text-yellow-700',
        approved: 'bg-emerald-100 text-emerald-700',
        rejected: 'bg-red-100 text-red-700'
      };
      const labelMap = { pending: '대기중', approved: '승인', rejected: '반려' };
      el.innerHTML = reqs.map(r => `
        <div class="flex justify-between items-start py-3 border-b last:border-0">
          <div>
            <div class="text-sm font-medium text-gray-800">
              ${r.start_date} ~ ${r.end_date}
              <span class="text-gray-400 font-normal">(${r.days}일)</span>
            </div>
            <div class="text-xs text-gray-400 mt-0.5">${r.reason || '사유 없음'}</div>
          </div>
          <span class="text-xs px-2.5 py-0.5 rounded-full font-medium ${badge[r.status]}">${labelMap[r.status]}</span>
        </div>`).join('');
    }

    document.getElementById('startDate').addEventListener('change', updatePreview);
    document.getElementById('endDate').addEventListener('change', updatePreview);
    function updatePreview() {
      const s = document.getElementById('startDate').value;
      const e = document.getElementById('endDate').value;
      const el = document.getElementById('daysPreview');
      if (s && e && e >= s) {
        el.textContent = '신청 일수: ' + getWorkdays(s, e) + '일 (주말 제외)';
      } else {
        el.textContent = '';
      }
    }

    async function applyLeave() {
      if (!selectedEmp) return;
      const start = document.getElementById('startDate').value;
      const end   = document.getElementById('endDate').value;
      const reason = document.getElementById('reason').value.trim();

      if (!start || !end) { showToast('날짜를 선택해 주세요.', true); return; }
      if (end < start)    { showToast('종료일이 시작일보다 빠릅니다.', true); return; }

      const days = getWorkdays(start, end);
      if (days === 0) { showToast('평일이 포함되지 않은 기간입니다.', true); return; }

      const { data: reqs } = await db.from('leave_requests')
        .select('days, status').eq('employee_id', selectedEmp.id);
      const approved  = (reqs || []).filter(r => r.status === 'approved').reduce((s, r) => s + r.days, 0);
      const remaining = selectedEmp.total_leave - approved;
      if (days > remaining) { showToast('잔여 연가(' + remaining + '일)가 부족합니다.', true); return; }

      const { error } = await db.from('leave_requests').insert({
        employee_id:   selectedEmp.id,
        employee_name: selectedEmp.name,
        start_date:    start,
        end_date:      end,
        days,
        reason,
        status: 'pending'
      });
      if (error) { showToast('신청 중 오류가 발생했습니다.', true); return; }

      document.getElementById('startDate').value = '';
      document.getElementById('endDate').value   = '';
      document.getElementById('reason').value    = '';
      document.getElementById('daysPreview').textContent = '';
      await refreshDashboard();
      showToast('연가 신청 완료 (' + days + '일)');
    }

    loadEmployees();
  </script>
</body>
</html>
