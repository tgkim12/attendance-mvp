<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeOff — 연가관리 시스템</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { font-family: 'Noto Sans KR', sans-serif; }
    .fade-in { animation: fadeIn .4s cubic-bezier(.16,1,.3,1) both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .spin { animation: spin .9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    select { -webkit-appearance: none; appearance: none; }
    input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: .5; }
    input[type="date"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }
  </style>
</head>
<body class="bg-orange-50 min-h-screen">

  <!-- ───── HEADER ───── -->
  <header class="bg-gradient-to-r from-orange-600 via-orange-500 to-amber-500 text-white shadow-lg shadow-orange-200">
    <div class="max-w-2xl mx-auto px-5 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="bg-white/20 backdrop-blur rounded-2xl p-2.5 shadow-inner">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2.5"/>
            <path d="M16 2v4M8 2v4M3 10h18M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/>
          </svg>
        </div>
        <div>
          <div class="text-xl font-bold tracking-tight">TimeOff</div>
          <div class="text-orange-100 text-xs font-medium mt-0.5">연가 신청 시스템</div>
        </div>
      </div>
      <a href="admin.html"
         class="flex items-center gap-1.5 text-sm bg-white/15 hover:bg-white/25 border border-white/25 px-4 py-2 rounded-xl font-medium transition-all">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          <path d="M19 8l2 2-2 2M5 8l-2 2 2 2" stroke-linecap="round"/>
        </svg>
        관리자
      </a>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-5 py-7 space-y-5">

    <!-- ───── REGISTER + SELECT CARD ───── -->
    <div class="bg-white rounded-2xl shadow-sm border border-orange-100/80 overflow-hidden">

      <!-- Register -->
      <div class="px-6 pt-6 pb-5 border-b border-gray-100">
        <div class="flex items-center gap-2.5 mb-4">
          <div class="bg-orange-100 rounded-xl p-2">
            <svg class="w-4 h-4 text-orange-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M22 11h-6M19 8v6" stroke-linecap="round"/>
            </svg>
          </div>
          <div>
            <h2 class="text-sm font-bold text-gray-800">직원 등록</h2>
            <p class="text-xs text-gray-400 mt-0.5">이름을 입력하면 연가 15일이 자동 부여됩니다</p>
          </div>
        </div>
        <div class="flex gap-2">
          <input id="newName" type="text" placeholder="홍길동"
                 class="flex-1 border border-gray-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent transition placeholder-gray-300 text-gray-800"
                 onkeydown="if(event.key==='Enter') addEmployee()">
          <button onclick="addEmployee()"
                  class="bg-orange-500 hover:bg-orange-600 active:scale-95 text-white text-sm px-5 py-2.5 rounded-xl font-bold transition-all shadow-sm shadow-orange-200 whitespace-nowrap">
            + 등록
          </button>
        </div>
      </div>

      <!-- Select -->
      <div class="px-6 py-5">
        <div class="flex items-center gap-2.5 mb-3">
          <div class="bg-orange-100 rounded-xl p-2">
            <svg class="w-4 h-4 text-orange-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <h2 class="text-sm font-bold text-gray-800">직원 선택</h2>
        </div>
        <div class="relative">
          <select id="empSelect" onchange="selectEmployee()"
                  class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent bg-white pr-10 transition text-gray-700 cursor-pointer">
            <option value="">— 직원을 선택하세요 —</option>
          </select>
          <div class="absolute right-3.5 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- ───── DASHBOARD ───── -->
    <div id="dashboard" class="hidden space-y-5">

      <!-- Leave Status -->
      <div class="bg-white rounded-2xl shadow-sm border border-orange-100/80 p-6 fade-in">
        <!-- Employee info -->
        <div class="flex items-center gap-3.5 mb-6">
          <div id="empAvatar"
               class="w-14 h-14 bg-gradient-to-br from-orange-400 to-orange-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold shadow-md shadow-orange-200 select-none shrink-0">
          </div>
          <div>
            <div id="empNameText" class="text-xl font-bold text-gray-900"></div>
            <div class="text-xs text-gray-400 mt-0.5 font-medium">2026년 연가 현황</div>
          </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-3 mb-5">
          <div class="bg-gray-50 border border-gray-100 rounded-xl p-4 text-center">
            <div id="totalDays" class="text-3xl font-bold text-gray-700">15</div>
            <div class="text-xs text-gray-400 mt-1 font-medium">총 연가</div>
          </div>
          <div class="bg-emerald-50 border border-emerald-100 rounded-xl p-4 text-center">
            <div id="usedDays" class="text-3xl font-bold text-emerald-500">0</div>
            <div class="text-xs text-emerald-400 mt-1 font-medium">사용 완료</div>
          </div>
          <div class="bg-orange-50 border border-orange-100 rounded-xl p-4 text-center">
            <div id="remainDays" class="text-3xl font-bold text-orange-500">15</div>
            <div class="text-xs text-orange-400 mt-1 font-medium">잔여 연가</div>
          </div>
        </div>

        <!-- Progress bar -->
        <div class="bg-gray-50 rounded-xl p-4 border border-gray-100">
          <div class="flex justify-between text-xs font-medium text-gray-500 mb-2.5">
            <span>연가 사용률</span>
            <span id="progressText" class="text-orange-500 font-semibold">0 / 15일</span>
          </div>
          <div class="h-3 bg-gray-200 rounded-full overflow-hidden">
            <div id="progressBar"
                 class="h-full bg-gradient-to-r from-orange-400 to-orange-600 rounded-full transition-all duration-700 ease-out"
                 style="width: 0%">
            </div>
          </div>
          <div class="flex justify-between text-xs text-gray-300 mt-1.5">
            <span>0일</span>
            <span>15일</span>
          </div>
        </div>
      </div>

      <!-- Apply Leave -->
      <div class="bg-white rounded-2xl shadow-sm border border-orange-100/80 p-6 fade-in" style="animation-delay:.05s">
        <div class="flex items-center gap-2.5 mb-5">
          <div class="bg-orange-100 rounded-xl p-2">
            <svg class="w-4 h-4 text-orange-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="18" rx="2.5"/>
              <path d="M16 2v4M8 2v4M3 10h18M12 14v4M10 16h4"/>
            </svg>
          </div>
          <h2 class="text-sm font-bold text-gray-800">연가 신청</h2>
        </div>

        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs font-semibold text-gray-500 block mb-1.5">시작일</label>
              <input type="date" id="startDate"
                     class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent transition text-gray-700">
            </div>
            <div>
              <label class="text-xs font-semibold text-gray-500 block mb-1.5">종료일</label>
              <input type="date" id="endDate"
                     class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent transition text-gray-700">
            </div>
          </div>

          <div>
            <label class="text-xs font-semibold text-gray-500 block mb-1.5">
              사유 <span class="text-gray-300 font-normal">(선택)</span>
            </label>
            <input type="text" id="reason" placeholder="예: 개인 사정, 여행, 경조사 등"
                   class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent transition placeholder-gray-300 text-gray-700">
          </div>

          <!-- Days preview -->
          <div id="daysPreview" class="hidden bg-orange-50 border border-orange-200 rounded-xl px-4 py-3">
            <div class="flex items-center gap-2">
              <svg class="w-4 h-4 text-orange-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/><path d="M12 7v5l3.5 3.5"/>
              </svg>
              <span id="daysPreviewText" class="text-sm font-bold text-orange-700"></span>
              <span class="text-xs text-orange-400 font-medium">주말 · 공휴일 제외</span>
            </div>
          </div>

          <button onclick="applyLeave()"
                  class="w-full bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 active:scale-[.99] text-white py-3.5 rounded-xl text-sm font-bold transition-all shadow-md shadow-orange-200 tracking-wide">
            연가 신청하기
          </button>
        </div>
      </div>

      <!-- History -->
      <div class="bg-white rounded-2xl shadow-sm border border-orange-100/80 p-6 fade-in" style="animation-delay:.1s">
        <div class="flex items-center gap-2.5 mb-5">
          <div class="bg-orange-100 rounded-xl p-2">
            <svg class="w-4 h-4 text-orange-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M9 12l2 2 4-4M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <h2 class="text-sm font-bold text-gray-800">내 신청 내역</h2>
        </div>
        <div id="history">
          <div class="text-center py-10">
            <div class="w-14 h-14 bg-gray-50 rounded-2xl flex items-center justify-center mx-auto mb-3">
              <svg class="w-7 h-7 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path d="M9 12h6M9 16h6M7 4H4a1 1 0 00-1 1v16a1 1 0 001 1h16a1 1 0 001-1V9l-5-5z"/>
                <path d="M13 4v5h5"/>
              </svg>
            </div>
            <p class="text-sm text-gray-400 font-medium">아직 신청한 연가가 없습니다</p>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Loading Overlay -->
  <div id="loading" class="hidden fixed inset-0 bg-black/10 backdrop-blur-[2px] flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl px-8 py-6 shadow-2xl flex items-center gap-3">
      <svg class="w-5 h-5 text-orange-500 spin" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
      <span class="text-sm font-semibold text-gray-600">처리 중...</span>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"
       class="fixed bottom-7 left-1/2 -translate-x-1/2 text-white text-sm px-5 py-3 rounded-2xl shadow-2xl opacity-0 transition-all duration-300 pointer-events-none z-50 flex items-center gap-2 whitespace-nowrap font-medium">
  </div>

  <script>
    const SUPABASE_URL = 'https://jygugdubaxipjykmagso.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5Z3VnZHViYXhpcGp5a21hZ3NvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzE3NjMsImV4cCI6MjA4ODgwNzc2M30.KdSqud604Kfo0QIlH8IycQPcPPwIn307y13eFENfs24';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    let selectedEmp = null;

    // ── Helpers ─────────────────────────────────────
    function showLoading(v) {
      document.getElementById('loading').classList.toggle('hidden', !v);
    }

    function showToast(msg, isError = false) {
      const el = document.getElementById('toast');
      const icon = isError
        ? `<svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>`
        : `<svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>`;
      el.innerHTML = icon + msg;
      el.className = `fixed bottom-7 left-1/2 -translate-x-1/2 text-white text-sm px-5 py-3 rounded-2xl shadow-2xl transition-all duration-300 z-50 flex items-center gap-2 whitespace-nowrap font-medium ${isError ? 'bg-red-500' : 'bg-gray-900'}`;
      el.style.opacity = '1';
      setTimeout(() => { el.style.opacity = '0'; }, 2800);
    }

    function getWorkdays(start, end) {
      let count = 0;
      const cur = new Date(start + 'T00:00:00');
      const last = new Date(end + 'T00:00:00');
      while (cur <= last) {
        const d = cur.getDay();
        if (d !== 0 && d !== 6) count++;
        cur.setDate(cur.getDate() + 1);
      }
      return count;
    }

    // ── Employee list ────────────────────────────────
    async function loadEmployees() {
      const { data, error } = await db.from('employees').select('*').order('created_at');
      if (error) { showToast('직원 목록을 불러오지 못했습니다.', true); return; }
      const select = document.getElementById('empSelect');
      const cur = select.value;
      select.innerHTML = '<option value="">— 직원을 선택하세요 —</option>';
      (data || []).forEach(emp => {
        const opt = document.createElement('option');
        opt.value = emp.id;
        opt.textContent = emp.name;
        select.appendChild(opt);
      });
      if (cur) {
        select.value = cur;
        if (!select.value) { document.getElementById('dashboard').classList.add('hidden'); selectedEmp = null; }
      }
    }

    // ── Add employee ─────────────────────────────────
    async function addEmployee() {
      const input = document.getElementById('newName');
      const name = input.value.trim();
      if (!name) { showToast('이름을 입력해 주세요.', true); return; }
      showLoading(true);
      const { error } = await db.from('employees').insert({ name });
      showLoading(false);
      if (error) {
        showToast(error.code === '23505' ? '이미 등록된 이름입니다.' : '등록 중 오류가 발생했습니다.', true);
        return;
      }
      input.value = '';
      await loadEmployees();
      showToast(name + ' 님이 등록되었습니다. (연가 15일)');
    }

    // ── Select employee ──────────────────────────────
    async function selectEmployee() {
      const id = document.getElementById('empSelect').value;
      if (!id) {
        document.getElementById('dashboard').classList.add('hidden');
        selectedEmp = null;
        return;
      }
      showLoading(true);
      const { data, error } = await db.from('employees').select('*').eq('id', id).single();
      showLoading(false);
      if (error) { showToast('직원 정보를 불러오지 못했습니다.', true); return; }
      selectedEmp = data;

      document.getElementById('empAvatar').textContent = data.name.charAt(0);
      document.getElementById('empNameText').textContent = data.name + ' 님';

      const dash = document.getElementById('dashboard');
      dash.classList.remove('hidden');
      await refreshDashboard();
    }

    // ── Refresh dashboard ────────────────────────────
    async function refreshDashboard() {
      if (!selectedEmp) return;
      const { data: reqs } = await db.from('leave_requests')
        .select('*').eq('employee_id', selectedEmp.id).order('created_at', { ascending: false });

      const approved = (reqs || []).filter(r => r.status === 'approved').reduce((s, r) => s + r.days, 0);
      const total    = selectedEmp.total_leave;
      const remain   = total - approved;
      const pct      = total > 0 ? Math.min(100, Math.round((approved / total) * 100)) : 0;

      document.getElementById('totalDays').textContent  = total;
      document.getElementById('usedDays').textContent   = approved;
      document.getElementById('remainDays').textContent = remain;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = approved + ' / ' + total + '일';

      renderHistory(reqs || []);
    }

    function renderHistory(reqs) {
      const el = document.getElementById('history');
      if (reqs.length === 0) {
        el.innerHTML = `
          <div class="text-center py-10">
            <div class="w-14 h-14 bg-gray-50 rounded-2xl flex items-center justify-center mx-auto mb-3">
              <svg class="w-7 h-7 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path d="M9 12h6M9 16h6M7 4H4a1 1 0 00-1 1v16a1 1 0 001 1h16a1 1 0 001-1V9l-5-5z"/>
                <path d="M13 4v5h5"/>
              </svg>
            </div>
            <p class="text-sm text-gray-400 font-medium">아직 신청한 연가가 없습니다</p>
          </div>`;
        return;
      }

      const cfg = {
        pending:  { bg: 'bg-amber-50',   border: 'border-amber-100',   dot: 'bg-amber-400',   badge: 'bg-amber-100 text-amber-700',   label: '대기중' },
        approved: { bg: 'bg-emerald-50', border: 'border-emerald-100', dot: 'bg-emerald-400', badge: 'bg-emerald-100 text-emerald-700', label: '승인'   },
        rejected: { bg: 'bg-red-50',     border: 'border-red-100',     dot: 'bg-red-400',     badge: 'bg-red-100 text-red-600',        label: '반려'   }
      };

      el.innerHTML = reqs.map(r => {
        const c = cfg[r.status];
        return `
          <div class="${c.bg} border ${c.border} rounded-xl p-4 mb-2.5 last:mb-0">
            <div class="flex justify-between items-start">
              <div class="flex items-start gap-3">
                <div class="mt-1.5 w-2 h-2 ${c.dot} rounded-full shrink-0"></div>
                <div>
                  <div class="text-sm font-bold text-gray-800">
                    ${r.start_date} ~ ${r.end_date}
                  </div>
                  <div class="text-xs text-gray-500 mt-0.5 font-medium">
                    ${r.days}일
                    ${r.reason ? ' · ' + r.reason : ''}
                  </div>
                </div>
              </div>
              <span class="text-xs px-2.5 py-1 rounded-lg font-bold ${c.badge} shrink-0">${c.label}</span>
            </div>
          </div>`;
      }).join('');
    }

    // ── Date preview ─────────────────────────────────
    document.getElementById('startDate').addEventListener('change', updatePreview);
    document.getElementById('endDate').addEventListener('change', updatePreview);

    function updatePreview() {
      const s = document.getElementById('startDate').value;
      const e = document.getElementById('endDate').value;
      const preview = document.getElementById('daysPreview');
      if (s && e && e >= s) {
        const days = getWorkdays(s, e);
        document.getElementById('daysPreviewText').textContent = '신청 일수: ' + days + '일';
        preview.classList.remove('hidden');
      } else {
        preview.classList.add('hidden');
      }
    }

    // ── Apply leave ──────────────────────────────────
    async function applyLeave() {
      if (!selectedEmp) return;
      const start  = document.getElementById('startDate').value;
      const end    = document.getElementById('endDate').value;
      const reason = document.getElementById('reason').value.trim();

      if (!start || !end) { showToast('날짜를 선택해 주세요.', true); return; }
      if (end < start)    { showToast('종료일이 시작일보다 빠릅니다.', true); return; }

      const days = getWorkdays(start, end);
      if (days === 0) { showToast('평일이 포함되지 않은 기간입니다.', true); return; }

      const { data: reqs } = await db.from('leave_requests')
        .select('days, status').eq('employee_id', selectedEmp.id);
      const approved  = (reqs || []).filter(r => r.status === 'approved').reduce((s, r) => s + r.days, 0);
      const remaining = selectedEmp.total_leave - approved;

      if (days > remaining) {
        showToast('잔여 연가(' + remaining + '일)가 부족합니다.', true);
        return;
      }

      showLoading(true);
      const { error } = await db.from('leave_requests').insert({
        employee_id:   selectedEmp.id,
        employee_name: selectedEmp.name,
        start_date:    start,
        end_date:      end,
        days,
        reason,
        status: 'pending'
      });
      showLoading(false);

      if (error) { showToast('신청 중 오류가 발생했습니다.', true); return; }

      document.getElementById('startDate').value = '';
      document.getElementById('endDate').value   = '';
      document.getElementById('reason').value    = '';
      document.getElementById('daysPreview').classList.add('hidden');

      await refreshDashboard();
      showToast('연가 신청이 완료되었습니다. (' + days + '일)');
    }

    loadEmployees();
  </script>
</body>
</html>
