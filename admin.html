<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>근태관리 - 관리자</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 min-h-screen">

  <header class="bg-slate-800 text-white shadow-md">
    <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
      <div>
        <h1 class="text-xl font-bold">관리자 페이지</h1>
        <p class="text-slate-400 text-xs mt-0.5">연가 승인 / 반려 처리</p>
      </div>
      <a href="index.html" class="text-sm bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg transition">
        ← 직원 페이지
      </a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8 space-y-6">

    <!-- 직원 현황 -->
    <div class="bg-white rounded-xl border shadow-sm p-6">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-4">직원 연가 현황</h2>
      <div id="empTable">
        <p class="text-gray-300 text-sm text-center py-6">등록된 직원이 없습니다.</p>
      </div>
    </div>

    <!-- 연가 신청 목록 -->
    <div class="bg-white rounded-xl border shadow-sm p-6">
      <div class="flex justify-between items-center mb-5">
        <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">연가 신청 목록</h2>
        <div class="flex gap-1.5" id="filterBtns">
          <button onclick="setFilter('all')"      class="filter-btn text-xs px-3 py-1.5 rounded-lg border font-medium transition">전체</button>
          <button onclick="setFilter('pending')"  class="filter-btn text-xs px-3 py-1.5 rounded-lg border font-medium transition">대기중</button>
          <button onclick="setFilter('approved')" class="filter-btn text-xs px-3 py-1.5 rounded-lg border font-medium transition">승인</button>
          <button onclick="setFilter('rejected')" class="filter-btn text-xs px-3 py-1.5 rounded-lg border font-medium transition">반려</button>
        </div>
      </div>
      <div id="reqList">
        <p class="text-gray-300 text-sm text-center py-6">신청 내역이 없습니다.</p>
      </div>
    </div>

  </main>

  <!-- Toast -->
  <div id="toast"
       class="fixed bottom-6 left-1/2 -translate-x-1/2 text-white text-sm px-5 py-2.5 rounded-xl shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50">
  </div>

  <script>
    const SUPABASE_URL = 'https://jygugdubaxipjykmagso.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5Z3VnZHViYXhpcGp5a21hZ3NvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzE3NjMsImV4cCI6MjA4ODgwNzc2M30.KdSqud604Kfo0QIlH8IycQPcPPwIn307y13eFENfs24';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentFilter = 'all';
    let allRequests = [];
    let allEmployees = [];

    function showToast(msg, isError = false) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `fixed bottom-6 left-1/2 -translate-x-1/2 text-white text-sm px-5 py-2.5 rounded-xl shadow-lg transition-opacity duration-300 z-50 ${isError ? 'bg-red-500' : 'bg-slate-700'}`;
      el.style.opacity = '1';
      setTimeout(() => { el.style.opacity = '0'; }, 2800);
    }

    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach((btn, i) => {
        const filters = ['all', 'pending', 'approved', 'rejected'];
        const active = filters[i] === f;
        btn.className = active
          ? 'filter-btn text-xs px-3 py-1.5 rounded-lg border font-medium transition bg-slate-800 text-white border-slate-800'
          : 'filter-btn text-xs px-3 py-1.5 rounded-lg border font-medium transition text-gray-500 border-gray-200 hover:bg-gray-50';
      });
      renderRequests();
    }

    function renderEmployeeTable(employees, requests) {
      const el = document.getElementById('empTable');
      if (employees.length === 0) {
        el.innerHTML = '<p class="text-gray-300 text-sm text-center py-6">등록된 직원이 없습니다.</p>';
        return;
      }
      el.innerHTML = `
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b text-gray-400 text-xs uppercase">
                <th class="text-left py-2 pb-3 pr-6">이름</th>
                <th class="text-center py-2 pb-3 px-4">총 연가</th>
                <th class="text-center py-2 pb-3 px-4">승인됨</th>
                <th class="text-center py-2 pb-3 px-4">대기중</th>
                <th class="text-center py-2 pb-3 px-4">잔여</th>
              </tr>
            </thead>
            <tbody>
              ${employees.map(emp => {
                const mine     = requests.filter(r => r.employee_id === emp.id);
                const approved = mine.filter(r => r.status === 'approved').reduce((s, r) => s + r.days, 0);
                const pending  = mine.filter(r => r.status === 'pending').reduce((s, r) => s + r.days, 0);
                const remain   = emp.total_leave - approved;
                const lowClass = remain <= 3 ? 'text-red-500 font-semibold' : 'text-blue-600';
                return `
                  <tr class="border-b last:border-0 hover:bg-slate-50">
                    <td class="py-3 pr-6 font-semibold text-gray-800">${emp.name}</td>
                    <td class="py-3 px-4 text-center text-gray-500">${emp.total_leave}</td>
                    <td class="py-3 px-4 text-center text-emerald-600 font-medium">${approved}</td>
                    <td class="py-3 px-4 text-center text-yellow-600">${pending}</td>
                    <td class="py-3 px-4 text-center ${lowClass}">${remain}</td>
                  </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`;
    }

    function renderRequests() {
      const el = document.getElementById('reqList');
      const filtered = currentFilter === 'all'
        ? allRequests
        : allRequests.filter(r => r.status === currentFilter);

      if (filtered.length === 0) {
        el.innerHTML = '<p class="text-gray-300 text-sm text-center py-8">해당 내역이 없습니다.</p>';
        return;
      }

      const badge = {
        pending:  'bg-yellow-100 text-yellow-700',
        approved: 'bg-emerald-100 text-emerald-700',
        rejected: 'bg-red-100 text-red-700'
      };
      const labelMap = { pending: '대기중', approved: '승인', rejected: '반려' };

      el.innerHTML = filtered.map(r => `
        <div class="flex justify-between items-center py-4 border-b last:border-0">
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-1">
              <span class="font-semibold text-gray-800">${r.employee_name}</span>
              <span class="text-xs px-2 py-0.5 rounded-full font-medium ${badge[r.status]}">${labelMap[r.status]}</span>
            </div>
            <div class="text-sm text-gray-600">
              ${r.start_date} ~ ${r.end_date}
              <span class="text-gray-400">(${r.days}일)</span>
            </div>
            ${r.reason ? `<div class="text-xs text-gray-400 mt-0.5">사유: ${r.reason}</div>` : ''}
            <div class="text-xs text-gray-300 mt-0.5">${new Date(r.created_at).toLocaleString('ko-KR')}</div>
          </div>
          ${r.status === 'pending' ? `
            <div class="flex gap-2 ml-4 shrink-0">
              <button onclick="updateStatus('${r.id}', 'approved', '${r.employee_name}')"
                      class="bg-emerald-500 hover:bg-emerald-600 text-white text-xs px-4 py-2 rounded-lg font-medium transition">
                승인
              </button>
              <button onclick="updateStatus('${r.id}', 'rejected', '${r.employee_name}')"
                      class="bg-red-500 hover:bg-red-600 text-white text-xs px-4 py-2 rounded-lg font-medium transition">
                반려
              </button>
            </div>` : ''}
        </div>`).join('');
    }

    async function updateStatus(id, status, name) {
      const label = status === 'approved' ? '승인' : '반려';
      if (!confirm(name + '의 연가 신청을 ' + label + '하시겠습니까?')) return;

      const { error } = await db.from('leave_requests').update({ status }).eq('id', id);
      if (error) { showToast('처리 중 오류가 발생했습니다.', true); return; }

      showToast(name + '의 연가가 ' + label + '되었습니다.');
      await loadAll();
    }

    async function loadAll() {
      const [{ data: emps }, { data: reqs }] = await Promise.all([
        db.from('employees').select('*').order('created_at'),
        db.from('leave_requests').select('*').order('created_at', { ascending: false })
      ]);
      allEmployees = emps || [];
      allRequests  = reqs || [];
      renderEmployeeTable(allEmployees, allRequests);
      renderRequests();
    }

    setFilter('all');
    loadAll();
  </script>
</body>
</html>
