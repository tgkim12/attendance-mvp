<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeOff Admin — 관리자</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { font-family: 'Noto Sans KR', sans-serif; }
    .spin { animation: spin .9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn .35s cubic-bezier(.16,1,.3,1) both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- ───── HEADER ───── -->
  <header class="bg-gray-900">
    <div class="max-w-5xl mx-auto px-5 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="bg-orange-500 rounded-2xl p-2.5 shadow-lg shadow-orange-900/30">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
        </div>
        <div>
          <div class="text-xl font-bold text-white tracking-tight">TimeOff <span class="text-orange-400">Admin</span></div>
          <div class="text-gray-500 text-xs font-medium mt-0.5">연가 승인 관리 시스템</div>
        </div>
      </div>
      <a href="index.html"
         class="flex items-center gap-1.5 text-sm text-gray-300 bg-white/8 hover:bg-white/15 border border-white/10 px-4 py-2 rounded-xl font-medium transition-all">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        직원 페이지
      </a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-5 py-7 space-y-6">

    <!-- ───── KPI CARDS ───── -->
    <div class="grid grid-cols-3 gap-4">
      <div class="bg-white rounded-2xl border border-gray-200/70 shadow-sm p-5 fade-in">
        <div class="flex items-center justify-between mb-4">
          <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">총 직원</span>
          <div class="bg-blue-50 rounded-xl p-2">
            <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
            </svg>
          </div>
        </div>
        <div id="kpiTotal" class="text-4xl font-bold text-gray-900">—</div>
        <div class="text-xs text-gray-400 mt-1.5 font-medium">등록된 직원 수</div>
      </div>

      <div class="bg-white rounded-2xl border border-gray-200/70 shadow-sm p-5 fade-in" style="animation-delay:.05s">
        <div class="flex items-center justify-between mb-4">
          <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">승인 대기</span>
          <div class="bg-amber-50 rounded-xl p-2">
            <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 6v6l4 2"/>
            </svg>
          </div>
        </div>
        <div id="kpiPending" class="text-4xl font-bold text-amber-500">—</div>
        <div class="text-xs text-gray-400 mt-1.5 font-medium">처리 대기 신청</div>
      </div>

      <div class="bg-white rounded-2xl border border-gray-200/70 shadow-sm p-5 fade-in" style="animation-delay:.1s">
        <div class="flex items-center justify-between mb-4">
          <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">승인 완료</span>
          <div class="bg-emerald-50 rounded-xl p-2">
            <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
              <path d="M22 4L12 14.01l-3-3"/>
            </svg>
          </div>
        </div>
        <div id="kpiApproved" class="text-4xl font-bold text-emerald-500">—</div>
        <div class="text-xs text-gray-400 mt-1.5 font-medium">총 승인 일수</div>
      </div>
    </div>

    <!-- ───── EMPLOYEE TABLE ───── -->
    <div class="bg-white rounded-2xl border border-gray-200/70 shadow-sm overflow-hidden fade-in" style="animation-delay:.12s">
      <div class="px-6 py-5 border-b border-gray-100 flex items-center gap-2.5">
        <div class="bg-orange-100 rounded-xl p-2">
          <svg class="w-4 h-4 text-orange-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
          </svg>
        </div>
        <h2 class="text-sm font-bold text-gray-800">직원별 연가 현황</h2>
      </div>
      <div id="empTable" class="p-6">
        <div class="text-center py-10">
          <div class="w-14 h-14 bg-gray-50 rounded-2xl flex items-center justify-center mx-auto mb-3">
            <svg class="w-7 h-7 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
            </svg>
          </div>
          <p class="text-sm text-gray-400 font-medium">등록된 직원이 없습니다</p>
        </div>
      </div>
    </div>

    <!-- ───── LEAVE REQUESTS ───── -->
    <div class="bg-white rounded-2xl border border-gray-200/70 shadow-sm overflow-hidden fade-in" style="animation-delay:.15s">
      <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center">
        <div class="flex items-center gap-2.5">
          <div class="bg-orange-100 rounded-xl p-2">
            <svg class="w-4 h-4 text-orange-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="18" rx="2.5"/>
              <path d="M16 2v4M8 2v4M3 10h18"/>
            </svg>
          </div>
          <h2 class="text-sm font-bold text-gray-800">연가 신청 목록</h2>
        </div>
        <!-- Segment control -->
        <div class="flex gap-1 bg-gray-100 rounded-xl p-1">
          <button onclick="setFilter('all')"      data-f="all"      class="filter-btn text-xs px-3.5 py-1.5 rounded-lg font-bold transition-all">전체</button>
          <button onclick="setFilter('pending')"  data-f="pending"  class="filter-btn text-xs px-3.5 py-1.5 rounded-lg font-bold transition-all">대기중</button>
          <button onclick="setFilter('approved')" data-f="approved" class="filter-btn text-xs px-3.5 py-1.5 rounded-lg font-bold transition-all">승인</button>
          <button onclick="setFilter('rejected')" data-f="rejected" class="filter-btn text-xs px-3.5 py-1.5 rounded-lg font-bold transition-all">반려</button>
        </div>
      </div>
      <div id="reqList" class="px-6 py-4">
        <div class="text-center py-10">
          <div class="w-14 h-14 bg-gray-50 rounded-2xl flex items-center justify-center mx-auto mb-3">
            <svg class="w-7 h-7 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M9 12h6M9 16h6M7 4H4a1 1 0 00-1 1v16a1 1 0 001 1h16a1 1 0 001-1V9l-5-5z"/>
              <path d="M13 4v5h5"/>
            </svg>
          </div>
          <p class="text-sm text-gray-400 font-medium">신청 내역이 없습니다</p>
        </div>
      </div>
    </div>

  </main>

  <!-- Loading -->
  <div id="loading" class="hidden fixed inset-0 bg-black/10 backdrop-blur-[2px] flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl px-8 py-6 shadow-2xl flex items-center gap-3">
      <svg class="w-5 h-5 text-orange-500 spin" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
      <span class="text-sm font-semibold text-gray-600">처리 중...</span>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"
       class="fixed bottom-7 left-1/2 -translate-x-1/2 text-white text-sm px-5 py-3 rounded-2xl shadow-2xl opacity-0 transition-all duration-300 pointer-events-none z-50 flex items-center gap-2 whitespace-nowrap font-medium">
  </div>

  <script>
    const SUPABASE_URL = 'https://jygugdubaxipjykmagso.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5Z3VnZHViYXhpcGp5a21hZ3NvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzE3NjMsImV4cCI6MjA4ODgwNzc2M30.KdSqud604Kfo0QIlH8IycQPcPPwIn307y13eFENfs24';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentFilter = 'all';
    let allRequests   = [];
    let allEmployees  = [];

    // ── Helpers ─────────────────────────────────────
    function showLoading(v) {
      document.getElementById('loading').classList.toggle('hidden', !v);
    }

    function showToast(msg, isError = false) {
      const el = document.getElementById('toast');
      const icon = isError
        ? `<svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>`
        : `<svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>`;
      el.innerHTML = icon + msg;
      el.className = `fixed bottom-7 left-1/2 -translate-x-1/2 text-white text-sm px-5 py-3 rounded-2xl shadow-2xl transition-all duration-300 z-50 flex items-center gap-2 whitespace-nowrap font-medium ${isError ? 'bg-red-500' : 'bg-gray-900'}`;
      el.style.opacity = '1';
      setTimeout(() => { el.style.opacity = '0'; }, 2800);
    }

    // ── Filter tabs ──────────────────────────────────
    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        const active = btn.dataset.f === f;
        btn.className = active
          ? 'filter-btn text-xs px-3.5 py-1.5 rounded-lg font-bold transition-all bg-white text-gray-900 shadow-sm'
          : 'filter-btn text-xs px-3.5 py-1.5 rounded-lg font-bold transition-all text-gray-500 hover:text-gray-700';
      });
      renderRequests();
    }

    // ── KPI ──────────────────────────────────────────
    function updateKPI(employees, requests) {
      const pending  = requests.filter(r => r.status === 'pending').length;
      const approved = requests.filter(r => r.status === 'approved').reduce((s, r) => s + r.days, 0);
      document.getElementById('kpiTotal').textContent    = employees.length;
      document.getElementById('kpiPending').textContent  = pending;
      document.getElementById('kpiApproved').textContent = approved + '일';
    }

    // ── Employee table ───────────────────────────────
    function renderEmployeeTable(employees, requests) {
      const el = document.getElementById('empTable');
      if (employees.length === 0) {
        el.innerHTML = `
          <div class="text-center py-10">
            <div class="w-14 h-14 bg-gray-50 rounded-2xl flex items-center justify-center mx-auto mb-3">
              <svg class="w-7 h-7 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
              </svg>
            </div>
            <p class="text-sm text-gray-400 font-medium">등록된 직원이 없습니다</p>
          </div>`;
        return;
      }

      const colors = [
        'from-orange-400 to-orange-600',
        'from-blue-400 to-blue-600',
        'from-violet-400 to-violet-600',
        'from-emerald-400 to-emerald-600',
        'from-pink-400 to-pink-600',
        'from-amber-400 to-amber-600',
      ];

      el.innerHTML = `
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead>
              <tr class="border-b border-gray-100">
                <th class="text-left text-xs font-bold text-gray-400 uppercase tracking-widest pb-3 pr-4">직원</th>
                <th class="text-center text-xs font-bold text-gray-400 uppercase tracking-widest pb-3 px-4">총 연가</th>
                <th class="text-center text-xs font-bold text-gray-400 uppercase tracking-widest pb-3 px-4">승인됨</th>
                <th class="text-center text-xs font-bold text-gray-400 uppercase tracking-widest pb-3 px-4">대기중</th>
                <th class="text-center text-xs font-bold text-gray-400 uppercase tracking-widest pb-3 px-4">잔여</th>
                <th class="pb-3 px-4 w-40 text-xs font-bold text-gray-400 uppercase tracking-widest text-right">사용률</th>
              </tr>
            </thead>
            <tbody>
              ${employees.map((emp, i) => {
                const mine     = requests.filter(r => r.employee_id === emp.id);
                const approved = mine.filter(r => r.status === 'approved').reduce((s, r) => s + r.days, 0);
                const pending  = mine.filter(r => r.status === 'pending').reduce((s, r) => s + r.days, 0);
                const remain   = emp.total_leave - approved;
                const pct      = Math.min(100, Math.round((approved / emp.total_leave) * 100));
                const color    = colors[i % colors.length];
                const remainCls = remain <= 3
                  ? 'bg-red-50 text-red-500 font-bold border border-red-100'
                  : 'bg-orange-50 text-orange-600 font-bold border border-orange-100';
                return `
                  <tr class="border-b border-gray-50 last:border-0 hover:bg-orange-50/40 transition-colors group">
                    <td class="py-4 pr-4">
                      <div class="flex items-center gap-3">
                        <div class="w-9 h-9 bg-gradient-to-br ${color} rounded-xl flex items-center justify-center text-white font-bold text-sm shadow-sm shrink-0">
                          ${emp.name.charAt(0)}
                        </div>
                        <span class="font-bold text-gray-800">${emp.name}</span>
                      </div>
                    </td>
                    <td class="py-4 px-4 text-center text-gray-500 font-semibold">${emp.total_leave}</td>
                    <td class="py-4 px-4 text-center">
                      <span class="inline-block bg-emerald-50 text-emerald-600 font-bold text-sm px-2.5 py-0.5 rounded-lg border border-emerald-100">${approved}</span>
                    </td>
                    <td class="py-4 px-4 text-center">
                      <span class="inline-block bg-amber-50 text-amber-600 font-bold text-sm px-2.5 py-0.5 rounded-lg border border-amber-100">${pending}</span>
                    </td>
                    <td class="py-4 px-4 text-center">
                      <span class="inline-block text-sm px-2.5 py-0.5 rounded-lg ${remainCls}">${remain}</span>
                    </td>
                    <td class="py-4 px-4">
                      <div class="flex items-center gap-2 justify-end">
                        <div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden min-w-[60px]">
                          <div class="h-full bg-gradient-to-r from-orange-400 to-orange-500 rounded-full transition-all"
                               style="width: ${pct}%"></div>
                        </div>
                        <span class="text-xs text-gray-400 font-semibold w-8 text-right">${pct}%</span>
                      </div>
                    </td>
                  </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`;
    }

    // ── Leave requests ───────────────────────────────
    function renderRequests() {
      const el = document.getElementById('reqList');
      const filtered = currentFilter === 'all'
        ? allRequests
        : allRequests.filter(r => r.status === currentFilter);

      if (filtered.length === 0) {
        el.innerHTML = `
          <div class="text-center py-10">
            <div class="w-14 h-14 bg-gray-50 rounded-2xl flex items-center justify-center mx-auto mb-3">
              <svg class="w-7 h-7 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path d="M9 12h6M9 16h6M7 4H4a1 1 0 00-1 1v16a1 1 0 001 1h16a1 1 0 001-1V9l-5-5z"/>
                <path d="M13 4v5h5"/>
              </svg>
            </div>
            <p class="text-sm text-gray-400 font-medium">해당 내역이 없습니다</p>
          </div>`;
        return;
      }

      const cfg = {
        pending:  { badge: 'bg-amber-100 text-amber-700 border-amber-200',   dot: 'bg-amber-400',   label: '대기중' },
        approved: { badge: 'bg-emerald-100 text-emerald-700 border-emerald-200', dot: 'bg-emerald-400', label: '승인'   },
        rejected: { badge: 'bg-red-100 text-red-600 border-red-200',         dot: 'bg-red-400',     label: '반려'   }
      };

      const colors = ['from-orange-400 to-orange-600','from-blue-400 to-blue-600','from-violet-400 to-violet-600','from-emerald-400 to-emerald-600','from-pink-400 to-pink-600','from-amber-400 to-amber-600'];

      el.innerHTML = filtered.map((r, i) => {
        const c = cfg[r.status];
        const color = colors[i % colors.length];
        return `
          <div class="flex items-center justify-between py-4 border-b border-gray-50 last:border-0 hover:bg-gray-50/60 transition-colors -mx-2 px-2 rounded-xl">
            <div class="flex items-center gap-4">
              <div class="w-11 h-11 bg-gradient-to-br ${color} rounded-2xl flex items-center justify-center text-white font-bold text-base shadow-sm shrink-0">
                ${r.employee_name.charAt(0)}
              </div>
              <div>
                <div class="flex items-center gap-2 flex-wrap">
                  <span class="font-bold text-gray-900 text-sm">${r.employee_name}</span>
                  <span class="inline-flex items-center gap-1.5 text-xs px-2.5 py-0.5 rounded-lg font-bold border ${c.badge}">
                    <span class="w-1.5 h-1.5 rounded-full ${c.dot}"></span>
                    ${c.label}
                  </span>
                </div>
                <div class="text-sm text-gray-500 mt-0.5 font-medium">
                  ${r.start_date} ~ ${r.end_date}
                  <span class="mx-1.5 text-gray-300">·</span>
                  <span class="font-bold text-gray-700">${r.days}일</span>
                  ${r.reason ? '<span class="mx-1.5 text-gray-300">·</span>' + r.reason : ''}
                </div>
                <div class="text-xs text-gray-300 mt-0.5">${new Date(r.created_at).toLocaleString('ko-KR')}</div>
              </div>
            </div>

            ${r.status === 'pending' ? `
              <div class="flex gap-2 ml-4 shrink-0">
                <button onclick="updateStatus('${r.id}', 'approved', '${r.employee_name}')"
                        class="flex items-center gap-1.5 bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white text-xs px-4 py-2 rounded-xl font-bold transition-all shadow-sm shadow-emerald-200">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path d="M20 6L9 17l-5-5"/>
                  </svg>승인
                </button>
                <button onclick="updateStatus('${r.id}', 'rejected', '${r.employee_name}')"
                        class="flex items-center gap-1.5 bg-white hover:bg-red-50 active:scale-95 text-red-500 border border-red-200 text-xs px-4 py-2 rounded-xl font-bold transition-all">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path d="M18 6L6 18M6 6l12 12"/>
                  </svg>반려
                </button>
              </div>` : ''}
          </div>`;
      }).join('');
    }

    // ── Update status ────────────────────────────────
    async function updateStatus(id, status, name) {
      const label = status === 'approved' ? '승인' : '반려';
      if (!confirm(name + ' 님의 연가 신청을 ' + label + '하시겠습니까?')) return;
      showLoading(true);
      const { error } = await db.from('leave_requests').update({ status }).eq('id', id);
      showLoading(false);
      if (error) { showToast('처리 중 오류가 발생했습니다.', true); return; }
      showToast(name + ' 님의 연가가 ' + label + '되었습니다.');
      await loadAll();
    }

    // ── Load all ─────────────────────────────────────
    async function loadAll() {
      const [{ data: emps }, { data: reqs }] = await Promise.all([
        db.from('employees').select('*').order('created_at'),
        db.from('leave_requests').select('*').order('created_at', { ascending: false })
      ]);
      allEmployees = emps || [];
      allRequests  = reqs || [];
      updateKPI(allEmployees, allRequests);
      renderEmployeeTable(allEmployees, allRequests);
      renderRequests();
    }

    setFilter('all');
    loadAll();
  </script>
</body>
</html>
